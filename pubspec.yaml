name: nefes_app
description: AI-Powered Islamic Mindfulness & Mental Health App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Navigation
  go_router: ^14.2.0
  # Local Storage (Offline-First)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  # AI / API
  google_generative_ai: ^0.4.3
  http: ^1.2.1
  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  firebase_analytics: ^11.0.1
  # UI Components
  flutter_svg: ^2.0.10
  lottie: ^3.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  # Audio
  just_audio: ^0.9.38
  audio_session: ^0.1.19
  # Notifications
  flutter_local_notifications: ^17.2.1
  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  uuid: ^4.4.0
  equatable: ^2.0.5
  # Islamic Features
  adhan: ^1.0.1
  hijri: ^3.0.0
  # Ads
  google_mobile_ads: ^5.1.0
  # In-App Purchase
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/lottie/
    - assets/data/
  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
