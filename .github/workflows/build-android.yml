name: Build Android APK & AAB

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Bağımlılıkları al
        run: flutter pub get

      - name: Testleri çalıştır
        run: flutter test

      - name: Keystore oluştur
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/keystore/nefes-release-key.jks
          echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=nefes-key" >> android/key.properties
          echo "storeFile=../keystore/nefes-release-key.jks" >> android/key.properties

      - name: AAB (Play Store) build al
        run: flutter build appbundle --release

      - name: APK build al
        run: flutter build apk --release --split-per-abi

      - name: Artifact olarak kaydet
        uses: actions/upload-artifact@v4
        with:
          name: nefes-release-${{ github.sha }}
          path: |
            build/app/outputs/bundle/release/*.aab
            build/app/outputs/flutter-apk/*.apk
          retention-days: 30
